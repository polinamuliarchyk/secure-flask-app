<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Security Alerts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #ecebf4 0%, #d9d7e4 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: #2b2738;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin-top: 60px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 50px 60px;
      animation: fadeIn 0.4s ease;
    }

    h3 {
      text-align: center;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 40px;
      color: #1e1a2d;
      letter-spacing: -0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 35px;
      border-radius: 12px;
      overflow: hidden;
      background: #f7f6fb;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 16px 18px;
      text-align: center;
      font-size: 15px;
      border-bottom: 1px solid #e0ddee;
    }

    th {
      background-color: #e6e3f1;
      color: #2b2738;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:nth-child(even) td {
      background: #f2f0f8;
    }

    td {
      color: #3b3751;
    }

    td:first-child {
      font-weight: 600;
      color: #6e54b5;
    }

    .back-link {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      background: linear-gradient(135deg, #7b5bde, #5c3fb4);
      color: #fff;
      box-shadow: 0 4px 10px rgba(123, 91, 222, 0.3);
      transition: all 0.25s ease;
    }

    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(123, 91, 222, 0.4);
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #6b6881;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
        <div style="text-align: center;">
          <a href="{{ url_for('routes.dashboard') }}" class="back-link">← Back to Dashboard</a>
           <a href="{{ url_for('routes.admin_panel_users') }}" class="back-link">Users</a>
            <a href="{{ url_for('routes.qr') }}" class="back-link">Qr for 2FA</a>
      </div>
    <h3>Security Alerts</h3>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Message</th>
          <th>IP</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
        {% for alert in alerts %}
        <tr>
          <td>{{ alert.alert_type }}</td>
          <td>{{ alert.message }}</td>
          <td>{{ alert.ip_address }}</td>
          <td>{{ alert.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>

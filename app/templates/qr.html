<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2FA QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #f7f7f9, #e3e4ec);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #2b2738;
    }

    .qr-container {
      background: #ffffff;
      padding: 50px 60px;
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 520px;
      width: 100%;
      animation: fadeIn 0.3s ease-in-out;
    }

    h2 {
      font-size: 30px;
      margin-bottom: 25px;
      color: #2b2738;
    }

    p {
      color: #444;
      margin-bottom: 25px;
      font-size: 17px;
    }

    img {
      border: 4px solid #6E54B5;
      border-radius: 14px;
      margin: 20px 0 25px 0;
      width: 300px;
      height: 300px;
      object-fit: contain;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .secret {
      background: #f3f2f8;
      padding: 12px 25px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 25px;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 26px;
      font-size: 16px;
      border-radius: 8px;
      font-weight: 600;
      background-color: #6E54B5;
      color: white;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .back-btn:hover {
      background-color: #5841a0;
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="qr-container">
    <h2>Your 2FA QR Code</h2>
    <p>Scan this QR code in your authenticator app to enable two-factor authentication.</p>

    <img src="data:image/png;base64,{{ qr_b64 }}" alt="2FA QR Code">

    <div class="secret">{{ secret }}</div>

    <br>
    {% if current_user.role == 'admin' %}
        <a href="{{ url_for('routes.admin_dashboard') }}" class="back-btn">← Back to Administration</a>
    {% elif current_user.role == 'teacher' %}
        <a href="{{ url_for('routes.teacher_account') }}" class="back-btn">← Back to Teacher Account</a>
    {% else %}
        <a href="{{ url_for('routes.user_account') }}" class="back-btn">← Back to My Courses</a>
    {% endif %}
  </div>
</body>
</html>
